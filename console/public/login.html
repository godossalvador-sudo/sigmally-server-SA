<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigmally — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:       #0d0e12;
            --surface:  #13151b;
            --border:   #1e2130;
            --border2:  #262a3a;
            --accent:   #f0a500;
            --accent2:  #d48f00;
            --text:     #c8ccd8;
            --muted:    #555c72;
            --danger:   #e05252;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 48px 48px;
            opacity: 0.4;
            pointer-events: none;
        }

        /* Glow blob */
        body::after {
            content: '';
            position: fixed;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(240,165,0,0.07) 0%, transparent 70%);
            pointer-events: none;
        }

        .card {
            position: relative;
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 4px;
            width: 380px;
            padding: 48px 40px 40px;
            animation: fadeUp 0.4s ease both;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            border-radius: 4px 4px 0 0;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .logo-icon svg {
            width: 20px;
            height: 20px;
            fill: #0d0e12;
        }

        .logo-text {
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: #fff;
            text-transform: uppercase;
        }

        .logo-sub {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .field-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
            margin-bottom: 24px;
        }

        .input-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 15px;
            height: 15px;
            stroke: var(--muted);
            fill: none;
            stroke-width: 2;
        }

        input[type="password"] {
            width: 100%;
            padding: 11px 14px 11px 40px;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: 3px;
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            letter-spacing: 0.1em;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(240,165,0,0.1);
        }

        input[type="password"]::placeholder {
            color: var(--muted);
            letter-spacing: 0.04em;
            font-size: 12px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #0d0e12;
            border: none;
            border-radius: 3px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover { background: var(--accent2); }
        .btn:active { transform: scale(0.98); }

        #message {
            margin-top: 14px;
            font-size: 12px;
            color: var(--danger);
            text-align: center;
            min-height: 16px;
            font-family: 'Space Mono', monospace;
        }

        .footer-note {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 11px;
            color: var(--muted);
            text-align: center;
            font-family: 'Space Mono', monospace;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-row">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <div>
                <div class="logo-text">Sigmally</div>
                <div class="logo-sub">Admin Console</div>
            </div>
        </div>

        <div class="field-label">Contraseña</div>
        <div class="input-wrap">
            <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="password" placeholder="Introduce tu contraseña" autofocus>
        </div>

        <button class="btn" onclick="login()">Acceder al Panel</button>
        <div id="message"></div>

        <div class="footer-note">Acceso restringido · shitmally.xyz</div>
    </div>

    <script>
        async function login() {
            const password = document.getElementById('password').value;
            const msg = document.getElementById('message');
            msg.innerText = '';
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            const data = await res.json();
            if (data.success) {
                window.location.href = '/';
            } else {
                msg.innerText = '✗ ' + (data.message || 'Contraseña incorrecta');
            }
        }
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
