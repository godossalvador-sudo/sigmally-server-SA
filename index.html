<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servidor SA - Sigmally</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00ff88;
    --green-dim: #00cc66;
    --dark: #050a0e;
    --dark2: #0a1520;
    --dark3: #0f2030;
    --border: #1a3a5c;
    --text: #c8e6ff;
    --text-dim: #5a8ab0;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    z-index: 0;
  }

  @keyframes gridMove {
    0% { transform: translateY(0); }
    100% { transform: translateY(40px); }
  }

  /* Floating blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    animation: blobFloat 8s ease-in-out infinite;
    z-index: 0;
  }
  .blob1 { width: 400px; height: 400px; background: #00ff88; top: -100px; left: -100px; animation-delay: 0s; }
  .blob2 { width: 300px; height: 300px; background: #0088ff; bottom: -80px; right: -80px; animation-delay: 3s; }
  .blob3 { width: 200px; height: 200px; background: #00ff88; bottom: 30%; left: 20%; animation-delay: 5s; }

  @keyframes blobFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    50% { transform: translate(20px, -20px) scale(1.05); }
  }

  /* Floating cells decoration */
  .cell {
    position: fixed;
    border-radius: 50%;
    border: 1px solid rgba(0,255,136,0.2);
    animation: cellFloat linear infinite;
    z-index: 0;
  }
  @keyframes cellFloat {
    0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    padding: 20px;
  }

  .logo {
    text-align: center;
    margin-bottom: 40px;
  }

  .logo-title {
    font-family: 'Orbitron', monospace;
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--green);
    letter-spacing: 4px;
    text-transform: uppercase;
    text-shadow: 0 0 30px rgba(0,255,136,0.5), 0 0 60px rgba(0,255,136,0.2);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { text-shadow: 0 0 30px rgba(0,255,136,0.5), 0 0 60px rgba(0,255,136,0.2); }
    50% { text-shadow: 0 0 50px rgba(0,255,136,0.8), 0 0 100px rgba(0,255,136,0.4); }
  }

  .logo-sub {
    font-size: 0.85rem;
    color: var(--text-dim);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .card {
    background: linear-gradient(135deg, rgba(10,21,32,0.95), rgba(15,32,48,0.95));
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 32px;
    backdrop-filter: blur(20px);
    box-shadow:
      0 0 0 1px rgba(0,255,136,0.05),
      0 20px 60px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(0,255,136,0.1);
    animation: cardIn 0.6s ease-out;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card-header {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    letter-spacing: 4px;
    color: var(--green);
    text-transform: uppercase;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-header::before, .card-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity: 0.3;
  }

  .field {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 0.75rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
    font-family: 'Orbitron', monospace;
  }

  input {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 1px;
    outline: none;
    transition: all 0.3s ease;
  }

  input:focus {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(0,255,136,0.1), 0 0 20px rgba(0,255,136,0.1);
    background: rgba(0,255,136,0.03);
  }

  input::placeholder { color: var(--text-dim); opacity: 0.5; }

  .btn-play {
    width: 100%;
    margin-top: 28px;
    padding: 16px;
    background: linear-gradient(135deg, var(--green), var(--green-dim));
    border: none;
    border-radius: 8px;
    color: #000;
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(0,255,136,0.3);
  }

  .btn-play::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .btn-play:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,255,136,0.5);
  }

  .btn-play:hover::before { opacity: 1; }
  .btn-play:active { transform: translateY(0); }

  .btn-play:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .status {
    margin-top: 16px;
    text-align: center;
    font-size: 0.85rem;
    letter-spacing: 1px;
    min-height: 20px;
    color: var(--text-dim);
    transition: all 0.3s;
  }

  .status.error { color: #ff4466; }
  .status.success { color: var(--green); }
  .status.loading { color: #88aaff; }

  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(136,170,255,0.3);
    border-top-color: #88aaff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .server-info {
    margin-top: 24px;
    padding: 12px 16px;
    background: rgba(0,255,136,0.03);
    border: 1px solid rgba(0,255,136,0.1);
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: blink 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .server-text {
    font-size: 0.78rem;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .server-text span {
    color: var(--green);
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="container">
  <div class="logo">
    <div class="logo-title">SERVIDOR SA</div>
    <div class="logo-sub">Sigmally Private Server</div>
  </div>

  <div class="card">
    <div class="card-header">Acceso</div>

    <div class="field">
      <label>Nombre</label>
      <input type="text" id="nameInput" placeholder="Tu nombre en el juego" maxlength="16" autocomplete="off">
    </div>

    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="off">
    </div>

    <button class="btn-play" id="playBtn" onclick="play()">▶ &nbsp; JUGAR</button>

    <div class="status" id="status"></div>

    <div class="server-info">
      <div class="dot"></div>
      <div class="server-text">Servidor: <span>SA — Sudamérica</span></div>
    </div>
  </div>
</div>

<script>
const SERVER_WS = "wss://sigmally-server-sa-production.up.railway.app//sigmally.com";

const shuffleArray = [];
for (let i = 0; i < 256; ++i) shuffleArray.push(i);
// Note: shuffle is sent by the server, we store it after handshake
let shuffle = null;
let unshuffle = null;

let socket = null;

function setStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.innerHTML = msg;
}

function play() {
  const name = document.getElementById('nameInput').value.trim() || 'Sin nombre';
  const password = document.getElementById('passwordInput').value;

  if (!password) {
    setStatus('Ingresa la contraseña', 'error');
    return;
  }

  document.getElementById('playBtn').disabled = true;
  setStatus('<span class="spinner"></span> Conectando...', 'loading');

  if (socket) {
    socket.close();
    socket = null;
  }

  socket = new WebSocket(SERVER_WS);
  socket.binaryType = 'arraybuffer';

  const timeout = setTimeout(() => {
    setStatus('No se pudo conectar al servidor', 'error');
    document.getElementById('playBtn').disabled = false;
    socket.close();
  }, 8000);

  socket.onopen = () => {
    // Send handshake
    sendHandshake();
  };

  socket.onmessage = (event) => {
    const data = new DataView(event.data);
    
    // First message: handshake response with shuffle table
    if (shuffle === null) {
      // Read "SIG 0.0.1\0" then 256 bytes shuffle
      let offset = 0;
      while (data.getUint8(offset) !== 0) offset++;
      offset++; // skip null terminator
      
      const shuffleBuf = new Uint8Array(event.data, offset, 256);
      shuffle = shuffleBuf;
      unshuffle = new Uint8Array(256);
      for (let i = 0; i < 256; i++) {
        unshuffle[shuffle[i]] = i;
      }

      clearTimeout(timeout);

      // Send spawn message
      sendSpawn(name, password);
      return;
    }

    // Check if server rejected with password error (0xb4)
    if (event.data.byteLength === 1) {
      const msgId = unshuffle[data.getUint8(0)];
      if (msgId === 0xb4) {
        setStatus('Contraseña incorrecta ❌', 'error');
        document.getElementById('playBtn').disabled = false;
        socket.close();
        socket = null;
        shuffle = null;
        return;
      }
    }

    // Connected successfully — redirect to Sigmally tournament page
    setStatus('¡Conectado! Redirigiendo...', 'success');
    setTimeout(() => {
      window.location.href = `https://one.sigmally.com/tournament/?ip=${encodeURIComponent(SERVER_WS)}`;
    }, 800);
  };

  socket.onerror = () => {
    clearTimeout(timeout);
    setStatus('Error de conexión', 'error');
    document.getElementById('playBtn').disabled = false;
    shuffle = null;
  };

  socket.onclose = () => {
    clearTimeout(timeout);
  };
}

function writeZTStringUTF8(str) {
  const encoded = new TextEncoder().encode(str);
  const buf = new Uint8Array(encoded.length + 1);
  buf.set(encoded);
  buf[encoded.length] = 0;
  return buf;
}

function sendHandshake() {
  const str = writeZTStringUTF8("SIG 0.0.1");
  socket.send(str.buffer);
}

function sendSpawn(name, password) {
  const body = JSON.stringify({ name, password, skin: "", clan: "", state: 0 });
  const bodyBytes = writeZTStringUTF8(body);
  
  // Message ID 0, shuffled
  // We need to wait for shuffle — it's already set at this point
  const msg = new Uint8Array(1 + bodyBytes.length);
  msg[0] = shuffle[0]; // shuffled message ID 0
  msg.set(bodyBytes, 1);
  socket.send(msg.buffer);
}

// Enter key support
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') play();
});

// Generate floating cells
for (let i = 0; i < 8; i++) {
  const cell = document.createElement('div');
  cell.className = 'cell';
  const size = 20 + Math.random() * 60;
  cell.style.cssText = `
    width: ${size}px;
    height: ${size}px;
    left: ${Math.random() * 100}%;
    animation-duration: ${8 + Math.random() * 12}s;
    animation-delay: ${Math.random() * 10}s;
    opacity: ${0.1 + Math.random() * 0.2};
  `;
  document.body.appendChild(cell);
}
</script>
</body>
</html>
